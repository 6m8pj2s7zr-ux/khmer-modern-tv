<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern TV Khmer | ប៊ុនហេង</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="top-bar">
            <div class="logo">MODERN<span>TV</span></div>
            <button id="btn-settings" class="icon-btn"><i class="fa fa-cog"></i></button>
        </div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="ស្វែងរកវីដេអូ ឬរឿងភាគ...">
            <i class="fa fa-search"></i>
        </div>
    </header>

    <main>
        <div class="video-grid" id="main-display">
            </div>
    </main>

    <div id="modal-ui" class="modal-bg">
        <div class="modal-content">
            <div class="modal-header">
                <h3>ការកំណត់ & បង្ហោះ</h3>
                <span id="close-ui">&times;</span>
            </div>
            
            <div class="setting-item">
                <span>របៀបងងឹត (Dark Mode)</span>
                <label class="switch">
                    <input type="checkbox" id="dark-mode-switch">
                    <span class="slider"></span>
                </label>
            </div>

            <hr>
            <div class="admin-panel">
                <h4>បង្ហោះមាតិកាថ្មី (Owner Only)</h4>
                <input type="text" id="new-title" placeholder="ចំណងជើង">
                <input type="text" id="new-thumb" placeholder="Link រូបភាព Thumbnail">
                <input type="text" id="new-url" placeholder="Link វីដេអូ">
                <select id="new-category">
                    <option value="movie">រឿងភាគ</option>
                    <option value="video">វីដេអូខ្លី</option>
                </select>
                <button id="save-post">បង្ហោះចូលវេបសាយ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
