<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Video Khmer - ទំព័រដើម</title>
    <!-- ភ្ជាប់ទៅកាន់ឯកសារ CSS របស់អ្នក -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ផ្នែកខាងលើគេបង្អស់ (Header & Menu) -->
    <header>
        <div class="logo">📺 TV Video Khmer</div>
        <nav>
            <ul>
                <li><a href="#">ទំព័រដើម</a></li>
                <li><a href="#">វីដេអូថ្មីៗ</a></li>
                <li><a href="#">ទំនាក់ទំនង</a></li>
            </ul>
        </nav>
    </header>

    <!-- ផ្នែកកណ្តាលសម្រាប់បង្ហាញវីដេអូ -->
    <main>
        <section class="video-section">
            <h2>វីដេអូកម្សាន្តប្រចាំថ្ងៃ</h2>
            
            <!-- កន្លែងបង្កប់វីដេអូ YouTube -->
            <div class="video-container">
                <!-- អ្នកអាចប្តូរ Link របស់ YouTube នៅត្រង់ពាក្យ src="..." -->
                <iframe width="100%" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            
            <p class="video-desc">សូមស្វាគមន៍មកកាន់វេបសាយរបស់យើង! កន្លែងប្រមូលផ្តុំវីដេអូកម្សាន្ត និងព័ត៌មានទាន់ហេតុការណ៍។</p>
        </section>
    </main>

    <!-- ផ្នែកខាងក្រោមគេបង្អស់ (Footer) -->
    <footer>
        <p>&copy; 2026 TV Video Khmer. រក្សាសិទ្ធិគ្រប់យ៉ាង។</p>
    </footer>

    <!-- ភ្ជាប់ទៅកាន់ឯកសារ JavaScript របស់អ្នក -->
    <script src="script.js"></script>

</body>
</html>
